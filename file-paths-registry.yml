  # ---------------------------------------------------------------------------
  # EXAMPLES
  # ---------------------------------------------------------------------------
  examples:
    description: Complete working examples for each cloud and use case
    base_path: examples/

    aws:
      description: Complete AWS example — VPC, EC2, ALB, RDS, S3, SQS, SNS, CloudWatch, Lambda, KMS
      files:
        main: examples/aws/main.tf

    azure:
      description: Complete Azure example — VNet, NSG, Key Vault, Storage, VM, SQL, Monitor, Service Bus
      files:
        main: examples/azure/main.tf

    gcp:
      description: Complete GCP example — VPC, IAM, KMS, Storage, Cloud SQL, GCE, Pub/Sub, Monitoring
      files:
        main: examples/gcp/main.tf

    webapp:
      description: Multi-cloud web app — Azure App Service vs AWS Elastic Beanstalk vs GCP App Engine
      files:
        main: examples/webapp/main.tf

  # ---------------------------------------------------------------------------
  # CROSS-CLOUD EQUIVALENTS REFERENCE
  # ---------------------------------------------------------------------------
  cross_cloud_equivalents:
    description: Maps equivalent services across AWS, Azure, and GCP

    networking:
      virtual_network:
        aws:   modules/aws/vpc/
        azure: modules/azure/vnet/
        gcp:   modules/gcp/vpc/
      firewall_security_group:
        aws:   modules/aws/security_group/
        azure: modules/azure/nsg/
        gcp:   modules/gcp/vpc/
      load_balancer:
        aws:   modules/aws/alb/
        azure: modules/azure/lb/
        gcp:   modules/gcp/lb/

    compute:
      virtual_machine:
        aws:   modules/aws/ec2/
        azure: modules/azure/vm/
        gcp:   modules/gcp/gce/
      kubernetes:
        aws:   modules/aws/eks/
        azure: modules/azure/aks/
        gcp:   modules/gcp/gke/
      web_app_paas:
        aws:   modules/aws/elastic_beanstalk/
        azure: modules/azure/webapp/
        gcp:   modules/gcp/appengine/
      serverless_function:
        aws:   modules/aws/lambda/
        azure: "(not yet implemented)"
        gcp:   "(not yet implemented)"

    database:
      relational_database:
        aws:   modules/aws/rds/
        azure: modules/azure/sql/
        gcp:   modules/gcp/cloudsql/
      in_memory_cache:
        aws:   modules/aws/elasticache/
        azure: "(not yet implemented)"
        gcp:   "(not yet implemented)"

    storage:
      object_storage:
        aws:   modules/aws/s3/
        azure: modules/azure/storage/
        gcp:   modules/gcp/storage/

    messaging:
      queue:
        aws:   modules/aws/sqs/
        azure: modules/azure/servicebus/
        gcp:   modules/gcp/pubsub/
      topic_pubsub:
        aws:   modules/aws/sns/
        azure: modules/azure/servicebus/
        gcp:   modules/gcp/pubsub/

    security:
      key_management:
        aws:   modules/aws/kms/
        azure: modules/azure/keyvault/
        gcp:   modules/gcp/kms/
      identity_access:
        aws:   modules/aws/iam/
        azure: "(managed via azurerm_role_assignment)"
        gcp:   modules/gcp/iam/

    dns:
      dns_management:
        aws:   modules/aws/route53/
        azure: "(not yet implemented)"
        gcp:   "(not yet implemented)"

    observability:
      monitoring_alerting:
        aws:   modules/aws/cloudwatch/
        azure: modules/azure/monitor/
        gcp:   modules/gcp/monitoring/
