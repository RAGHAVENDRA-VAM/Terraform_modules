# =============================================================================
# file-paths-registry.yml
# =============================================================================
# Purpose: Complete registry of all file paths in the Terraform Modules repository.
# This file serves as a reference for AI agents and developers to locate specific
# templates, modules, and examples across AWS, Azure, and GCP.
#
# Repository  : Terraform_Modules
# Clouds      : AWS | Azure | GCP
# Last Updated: 2025
# =============================================================================

repository:
  root: Terraform_Modules/

  # ---------------------------------------------------------------------------
  # ROOT MODULE FILES
  # ---------------------------------------------------------------------------
  root_module:
    description: Root module that wires all cloud modules together
    files:
      entrypoint: main.tf
      variables:  variables.tf
      outputs:    outputs.tf
      readme:     README.md
      gitignore:  .gitignore

  # ---------------------------------------------------------------------------
  # AWS MODULES
  # ---------------------------------------------------------------------------
  aws:
    provider:         hashicorp/aws
    provider_version: ">= 5.0"
    base_path:        modules/aws/

    modules:

      vpc:
        description: VPC, public/private subnets, Internet Gateway, NAT Gateway, route tables
        path: modules/aws/vpc/
        resources:
          - aws_vpc
          - aws_subnet
          - aws_internet_gateway
          - aws_nat_gateway
          - aws_eip
          - aws_route_table
          - aws_route_table_association
        files:
          provider:  modules/aws/vpc/provider.tf
          main:      modules/aws/vpc/main.tf
          variables: modules/aws/vpc/variables.tf
          outputs:   modules/aws/vpc/outputs.tf
          readme:    modules/aws/vpc/README.md

      ec2:
        description: EC2 instances, EBS volumes, Elastic IPs, IMDSv2 enforced
        path: modules/aws/ec2/
        resources:
          - aws_instance
          - aws_eip
        files:
          provider:  modules/aws/ec2/provider.tf
          main:      modules/aws/ec2/main.tf
          variables: modules/aws/ec2/variables.tf
          outputs:   modules/aws/ec2/outputs.tf
          readme:    modules/aws/ec2/README.md

      security_group:
        description: Security groups with ingress and egress rules
        path: modules/aws/security_group/
        resources:
          - aws_security_group
          - aws_vpc_security_group_ingress_rule
          - aws_vpc_security_group_egress_rule
        files:
          provider:  modules/aws/security_group/provider.tf
          main:      modules/aws/security_group/main.tf
          variables: modules/aws/security_group/variables.tf
          outputs:   modules/aws/security_group/outputs.tf

      s3:
        description: S3 bucket, versioning, SSE encryption, lifecycle rules, CORS, access logging
        path: modules/aws/s3/
        resources:
          - aws_s3_bucket
          - aws_s3_bucket_versioning
          - aws_s3_bucket_server_side_encryption_configuration
          - aws_s3_bucket_public_access_block
          - aws_s3_bucket_lifecycle_configuration
          - aws_s3_bucket_policy
          - aws_s3_bucket_cors_configuration
          - aws_s3_bucket_logging
        files:
          provider:  modules/aws/s3/provider.tf
          main:      modules/aws/s3/main.tf
          variables: modules/aws/s3/variables.tf
          outputs:   modules/aws/s3/outputs.tf

      rds:
        description: RDS instance, DB subnet group, parameter group
        path: modules/aws/rds/
        resources:
          - aws_db_instance
          - aws_db_subnet_group
          - aws_db_parameter_group
        files:
          provider:  modules/aws/rds/provider.tf
          main:      modules/aws/rds/main.tf
          variables: modules/aws/rds/variables.tf
          outputs:   modules/aws/rds/outputs.tf

      iam:
        description: IAM roles, policies, users, groups, instance profiles
        path: modules/aws/iam/
        resources:
          - aws_iam_role
          - aws_iam_role_policy_attachment
          - aws_iam_role_policy
          - aws_iam_instance_profile
          - aws_iam_policy
          - aws_iam_user
          - aws_iam_user_policy_attachment
          - aws_iam_group
          - aws_iam_group_policy_attachment
        files:
          provider:  modules/aws/iam/provider.tf
          main:      modules/aws/iam/main.tf
          variables: modules/aws/iam/variables.tf
          outputs:   modules/aws/iam/outputs.tf

      eks:
        description: EKS cluster, managed node groups, cluster addons, IAM roles
        path: modules/aws/eks/
        resources:
          - aws_eks_cluster
          - aws_eks_node_group
          - aws_eks_addon
          - aws_iam_role
          - aws_iam_role_policy_attachment
        files:
          provider:  modules/aws/eks/provider.tf
          main:      modules/aws/eks/main.tf
          variables: modules/aws/eks/variables.tf
          outputs:   modules/aws/eks/outputs.tf

      alb:
        description: Application/Network Load Balancer, target groups, listeners, routing rules
        path: modules/aws/alb/
        resources:
          - aws_lb
          - aws_lb_target_group
          - aws_lb_listener
          - aws_lb_listener_rule
        files:
          provider:  modules/aws/alb/provider.tf
          main:      modules/aws/alb/main.tf
          variables: modules/aws/alb/variables.tf
          outputs:   modules/aws/alb/outputs.tf

      route53:
        description: Hosted zones, DNS records (A, CNAME, alias), health checks
        path: modules/aws/route53/
        resources:
          - aws_route53_zone
          - aws_route53_record
          - aws_route53_health_check
        files:
          provider:  modules/aws/route53/provider.tf
          main:      modules/aws/route53/main.tf
          variables: modules/aws/route53/variables.tf
          outputs:   modules/aws/route53/outputs.tf

      elasticache:
        description: Redis replication group, Memcached cluster, subnet group, parameter group
        path: modules/aws/elasticache/
        resources:
          - aws_elasticache_replication_group
          - aws_elasticache_cluster
          - aws_elasticache_subnet_group
          - aws_elasticache_parameter_group
        files:
          provider:  modules/aws/elasticache/provider.tf
          main:      modules/aws/elasticache/main.tf
          variables: modules/aws/elasticache/variables.tf
          outputs:   modules/aws/elasticache/outputs.tf

      sqs:
        description: SQS standard/FIFO queues, dead-letter queue, redrive policy
        path: modules/aws/sqs/
        resources:
          - aws_sqs_queue
          - aws_sqs_queue_redrive_allow_policy
          - aws_sqs_queue_policy
        files:
          provider:  modules/aws/sqs/provider.tf
          main:      modules/aws/sqs/main.tf
          variables: modules/aws/sqs/variables.tf
          outputs:   modules/aws/sqs/outputs.tf

      sns:
        description: SNS standard/FIFO topics, subscriptions, topic policy
        path: modules/aws/sns/
        resources:
          - aws_sns_topic
          - aws_sns_topic_policy
          - aws_sns_topic_subscription
        files:
          provider:  modules/aws/sns/provider.tf
          main:      modules/aws/sns/main.tf
          variables: modules/aws/sns/variables.tf
          outputs:   modules/aws/sns/outputs.tf

      cloudwatch:
        description: Log groups, metric alarms, dashboards, EventBridge rules and targets
        path: modules/aws/cloudwatch/
        resources:
          - aws_cloudwatch_log_group
          - aws_cloudwatch_metric_alarm
          - aws_cloudwatch_dashboard
          - aws_cloudwatch_event_rule
          - aws_cloudwatch_event_target
        files:
          provider:  modules/aws/cloudwatch/provider.tf
          main:      modules/aws/cloudwatch/main.tf
          variables: modules/aws/cloudwatch/variables.tf
          outputs:   modules/aws/cloudwatch/outputs.tf

      kms:
        description: KMS customer-managed keys, aliases, grants
        path: modules/aws/kms/
        resources:
          - aws_kms_key
          - aws_kms_alias
          - aws_kms_grant
        files:
          provider:  modules/aws/kms/provider.tf
          main:      modules/aws/kms/main.tf
          variables: modules/aws/kms/variables.tf
          outputs:   modules/aws/kms/outputs.tf

      lambda:
        description: Lambda functions, IAM role, event source mappings, function URLs, CloudWatch log group
        path: modules/aws/lambda/
        resources:
          - aws_lambda_function
          - aws_lambda_function_url
          - aws_lambda_event_source_mapping
          - aws_iam_role
          - aws_iam_role_policy_attachment
          - aws_cloudwatch_log_group
        files:
          provider:  modules/aws/lambda/provider.tf
          main:      modules/aws/lambda/main.tf
          variables: modules/aws/lambda/variables.tf
          outputs:   modules/aws/lambda/outputs.tf

      elastic_beanstalk:
        description: Elastic Beanstalk application, environment, IAM roles, app versions (equivalent to Azure App Service)
        path: modules/aws/elastic_beanstalk/
        resources:
          - aws_elastic_beanstalk_application
          - aws_elastic_beanstalk_environment
          - aws_elastic_beanstalk_application_version
          - aws_iam_role
          - aws_iam_instance_profile
          - aws_iam_role_policy_attachment
        files:
          provider:  modules/aws/elastic_beanstalk/provider.tf
          main:      modules/aws/elastic_beanstalk/main.tf
          variables: modules/aws/elastic_beanstalk/variables.tf
          outputs:   modules/aws/elastic_beanstalk/outputs.tf
          readme:    modules/aws/elastic_beanstalk/README.md

  # ---------------------------------------------------------------------------
