          - google_compute_firewall
        files:
          provider:  modules/gcp/vpc/provider.tf
          main:      modules/gcp/vpc/main.tf
          variables: modules/gcp/vpc/variables.tf
          outputs:   modules/gcp/vpc/outputs.tf

      gce:
