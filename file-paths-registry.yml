          - azurerm_virtual_network
          - azurerm_subnet
          - azurerm_resource_group
          - azurerm_network_security_group
          - azurerm_subnet_network_security_group_association
          - azurerm_nat_gateway
          - azurerm_public_ip
          - azurerm_nat_gateway_public_ip_association
        files:
          provider:  modules/azure/vnet/provider.tf
          main:      modules/azure/vnet/main.tf
          variables: modules/azure/vnet/variables.tf
          outputs:   modules/azure/vnet/outputs.tf

      vm:
        description: Linux/Windows VMs, NICs, managed disks, public IP, system-assigned identity
        path: modules/azure/vm/
        resources:
          - azurerm_linux_virtual_machine
          - azurerm_windows_virtual_machine
          - azurerm_network_interface
